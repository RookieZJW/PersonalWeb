<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言管理 - 管理后台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <div class="admin-topbar">
    <div class="brand">⚙️ 管理后台</div>
    <div class="user-info">
      <span id="admin-nickname">管理员</span>
      <button id="logout-btn" class="logout-btn">退出登录</button>
    </div>
  </div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-title">管理菜单</div>
      <a href="dashboard.html"><span class="icon">📊</span> 仪表盘</a>
      <a href="articles.html"><span class="icon">📝</span> 文章管理</a>
      <a href="messages.html" class="active"><span class="icon">💬</span> 留言管理</a>
      <a href="projects.html"><span class="icon">🚀</span> 项目管理</a>
      <a href="gallery.html"><span class="icon">📷</span> 相册管理</a>
      <a href="settings.html"><span class="icon">⚙️</span> 站点设置</a>
    </aside>

    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h2>💬 留言管理</h2>
        <div style="display:flex;gap:8px;">
          <select id="status-filter" class="glow-input" style="width:auto;">
            <option value="">全部</option>
            <option value="0">待审核</option>
            <option value="1">已通过</option>
            <option value="2">已拒绝</option>
          </select>
        </div>
      </div>

      <div class="card" style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr><th>昵称</th><th>内容</th><th>状态</th><th>时间</th><th>操作</th></tr>
          </thead>
          <tbody id="messages-tbody">
            <tr><td colspan="5" style="text-align:center;padding:40px;">加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="pagination" class="pagination" style="margin-top:24px;"></div>
    </main>
  </div>

  <!-- 回复Modal -->
  <div id="reply-modal" class="modal-overlay">
    <div class="modal">
      <h3>回复 / 审核留言</h3>
      <div class="form-group">
        <label>留言内容</label>
        <p id="reply-content" style="color:var(--text-secondary);background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;margin-bottom:12px;"></p>
      </div>
      <div class="form-group">
        <label>回复内容（选填）</label>
        <textarea id="reply-text" class="glow-textarea" rows="4" placeholder="输入回复内容..."></textarea>
      </div>
      <div class="form-group">
        <label>审核状态</label>
        <select id="reply-status" class="glow-input">
          <option value="1">通过并展示</option>
          <option value="2">拒绝（不展示）</option>
        </select>
      </div>
      <input type="hidden" id="reply-id">
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitReply()">确认</button>
        <button class="btn btn-secondary" onclick="closeReply()">取消</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    let currentPage = 1;
    let currentStatus = '';

    document.getElementById('status-filter').addEventListener('change', function() {
      currentStatus = this.value;
      currentPage = 1;
      loadMessages();
    });

    async function loadMessages() {
      const tbody = document.getElementById('messages-tbody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;">加载中...</td></tr>';

      try {
        const params = { page: currentPage, pageSize: 20 };
        if (currentStatus !== '') params.status = currentStatus;

        const res = await messagesAPI.adminList(params);
        const { list, pagination } = res.data;

        if (list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted);">暂无留言</td></tr>';
          return;
        }

        const statusText = {0: '待审核', 1: '已通过', 2: '已拒绝'};
        const statusBadge = {0: 'badge-warning', 1: 'badge-success', 2: 'badge-danger'};

        tbody.innerHTML = list.map(m => `
          <tr>
            <td><strong>${escapeHtml(m.nickname)}</strong></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(m.content)}</td>
            <td><span class="badge ${statusBadge[m.status]}">${statusText[m.status]}</span></td>
            <td>${formatDate(m.created_at)}</td>
            <td class="actions">
              <button class="btn btn-sm btn-secondary" onclick="openReply(${m.id}, '${escapeHtml(m.content)}', '${escapeHtml(m.reply||'')}', ${m.status})">审核/回复</button>
              <button class="btn btn-sm btn-danger" onclick="deleteMessage(${m.id})">删除</button>
            </td>
          </tr>
        `).join('');

        // 分页
        const pagContainer = document.getElementById('pagination');
        pagContainer.innerHTML = '';
        for (let i = 1; i <= pagination.totalPages; i++) {
          const btn = document.createElement('button');
          btn.className = 'page-btn ' + (i === pagination.page ? 'active' : '');
          btn.textContent = i;
          btn.addEventListener('click', () => { currentPage = i; loadMessages(); });
          pagContainer.appendChild(btn);
        }
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#ef4444;">加载失败</td></tr>';
      }
    }

    function openReply(id, content, reply, status) {
      document.getElementById('reply-id').value = id;
      document.getElementById('reply-content').textContent = content;
      document.getElementById('reply-text').value = reply || '';
      document.getElementById('reply-status').value = status === 0 ? 1 : status;
      document.getElementById('reply-modal').classList.add('active');
    }

    function closeReply() {
      document.getElementById('reply-modal').classList.remove('active');
    }

    async function submitReply() {
      const id = document.getElementById('reply-id').value;
      const reply = document.getElementById('reply-text').value.trim();
      const status = parseInt(document.getElementById('reply-status').value);

      try {
        await messagesAPI.approve(id, { status, reply: reply || null });
        showToast('操作成功', 'success');
        closeReply();
        loadMessages();
      } catch (e) {
        showToast('操作失败: ' + e.message, 'error');
      }
    }

    async function deleteMessage(id) {
      if (!confirm('确定删除此留言吗？')) return;
      try {
        await messagesAPI.delete(id);
        showToast('留言已删除', 'success');
        loadMessages();
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleString('zh-CN');
    }

    loadMessages();
  </script>
</body>
</html>
