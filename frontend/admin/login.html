<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 个人网站后台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">

  <canvas id="particles-canvas"></canvas>

  <div class="login-card card">
    <div class="logo">🔐</div>
    <h1>管理员登录</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" class="glow-input" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" class="glow-input" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <p id="login-error" style="color:#ef4444;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;">登 录</button>
    </form>
    <p style="margin-top:20px;font-size:0.8rem;color:var(--text-muted);">
      <a href="../index.html">← 返回前台</a>
    </p>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // 如果已登录，自动跳转
    if (sessionStorage.getItem('admin_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const submitBtn = this.querySelector('button[type="submit"]');
      const errorEl = document.getElementById('login-error');

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      errorEl.style.display = 'none';

      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const res = await authAPI.login(username, password);

        // 保存登录状态
        sessionStorage.setItem('admin_token', res.data.token);
        sessionStorage.setItem('admin_user', JSON.stringify(res.data.user));

        // 跳转后台首页
        window.location.href = 'dashboard.html';
      } catch (e) {
        errorEl.textContent = e.message || '登录失败';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
