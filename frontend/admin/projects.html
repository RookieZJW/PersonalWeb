<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目管理 - 管理后台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <div class="admin-topbar">
    <div class="brand">⚙️ 管理后台</div>
    <div class="user-info">
      <span id="admin-nickname">管理员</span>
      <button id="logout-btn" class="logout-btn">退出登录</button>
    </div>
  </div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-title">管理菜单</div>
      <a href="dashboard.html"><span class="icon">📊</span> 仪表盘</a>
      <a href="articles.html"><span class="icon">📝</span> 文章管理</a>
      <a href="messages.html"><span class="icon">💬</span> 留言管理</a>
      <a href="projects.html" class="active"><span class="icon">🚀</span> 项目管理</a>
      <a href="gallery.html"><span class="icon">📷</span> 相册管理</a>
      <a href="settings.html"><span class="icon">⚙️</span> 站点设置</a>
    </aside>

    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h2>🚀 项目管理</h2>
        <button class="btn btn-primary" onclick="openProjectEditor()">+ 添加项目</button>
      </div>

      <div class="card" style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr><th>名称</th><th>简介</th><th>技术标签</th><th>状态</th><th>排序</th><th>操作</th></tr>
          </thead>
          <tbody id="projects-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- 编辑Modal -->
  <div id="project-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">添加项目</h3>
      <form id="project-form">
        <div class="form-group">
          <label>项目名称 *</label>
          <input type="text" id="proj-title" class="glow-input" required>
        </div>
        <div class="form-group">
          <label>项目介绍</label>
          <textarea id="proj-desc" class="glow-textarea" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>技术标签（逗号分隔）</label>
          <input type="text" id="proj-tags" class="glow-input" placeholder="Node.js, Express, MySQL">
        </div>
        <div class="form-group">
          <label>缩略图（可选）</label>
          <input type="file" id="proj-thumbnail" accept="image/*">
          <input type="hidden" id="proj-existing-thumbnail">
        </div>
        <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>在线预览链接</label>
            <input type="url" id="proj-demo" class="glow-input" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Git仓库链接</label>
            <input type="url" id="proj-github" class="glow-input" placeholder="https://github.com/...">
          </div>
        </div>
        <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>排序（数字越小越靠前）</label>
            <input type="number" id="proj-sort" class="glow-input" value="0">
          </div>
          <div class="form-group">
            <label>状态</label>
            <select id="proj-status" class="glow-input">
              <option value="1">展示</option>
              <option value="0">隐藏</option>
            </select>
          </div>
        </div>
        <input type="hidden" id="proj-id">
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn btn-secondary" onclick="closeProjectEditor()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    async function loadProjects() {
      const tbody = document.getElementById('projects-tbody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">加载中...</td></tr>';

      try {
        const res = await projectsAPI.list();
        const projects = res.data;

        if (!projects || projects.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">暂无项目</td></tr>';
          return;
        }

        tbody.innerHTML = projects.map(p => `
          <tr>
            <td><strong>${escapeHtml(p.title)}</strong></td>
            <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(p.description || '')}</td>
            <td>${(p.tech_tags||'').split(',').filter(Boolean).map(t => `<span class="badge badge-info" style="margin:2px;">${t.trim()}</span>`).join('')}</td>
            <td><span class="badge ${p.status === 1 ? 'badge-success' : 'badge-warning'}">${p.status === 1 ? '展示' : '隐藏'}</span></td>
            <td>${p.sort_order}</td>
            <td class="actions">
              <button class="btn btn-sm btn-secondary" onclick="openProjectEditor(${p.id})">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteProject(${p.id},'${escapeHtml(p.title)}')">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#ef4444;">加载失败</td></tr>';
      }
    }

    async function openProjectEditor(id) {
      const modal = document.getElementById('project-modal');
      document.getElementById('modal-title').textContent = id ? '编辑项目' : '添加项目';
      document.getElementById('project-form').reset();
      document.getElementById('proj-id').value = '';

      if (id) {
        try {
          const res = await projectsAPI.list();
          const p = res.data.find(x => x.id === id);
          if (!p) return showToast('项目不存在', 'error');
          document.getElementById('proj-id').value = p.id;
          document.getElementById('proj-title').value = p.title;
          document.getElementById('proj-desc').value = p.description || '';
          document.getElementById('proj-tags').value = p.tech_tags || '';
          document.getElementById('proj-existing-thumbnail').value = p.thumbnail || '';
          document.getElementById('proj-demo').value = p.demo_url || '';
          document.getElementById('proj-github').value = p.github_url || '';
          document.getElementById('proj-sort').value = p.sort_order || 0;
          document.getElementById('proj-status').value = p.status;
        } catch (e) {
          showToast('加载项目失败', 'error');
          return;
        }
      }

      modal.classList.add('active');
    }

    function closeProjectEditor() {
      document.getElementById('project-modal').classList.remove('active');
    }

    document.getElementById('project-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('proj-id').value;
      const thumbnailInput = document.getElementById('proj-thumbnail');
      const thumbnail = thumbnailInput.files[0] || null;

      const data = {
        title: document.getElementById('proj-title').value.trim(),
        description: document.getElementById('proj-desc').value.trim(),
        tech_tags: document.getElementById('proj-tags').value.trim(),
        demo_url: document.getElementById('proj-demo').value.trim(),
        github_url: document.getElementById('proj-github').value.trim(),
        sort_order: parseInt(document.getElementById('proj-sort').value) || 0,
        status: parseInt(document.getElementById('proj-status').value)
      };

      if (thumbnail) {
        data.thumbnail = thumbnail;
      } else {
        data.existing_thumbnail = document.getElementById('proj-existing-thumbnail').value;
      }

      try {
        if (id) {
          await projectsAPI.update(id, data);
          showToast('项目更新成功', 'success');
        } else {
          await projectsAPI.create(data);
          showToast('项目添加成功', 'success');
        }
        closeProjectEditor();
        loadProjects();
      } catch (err) {
        showToast('保存失败: ' + err.message, 'error');
      }
    });

    async function deleteProject(id, title) {
      if (!confirm('确定删除项目「' + title + '」吗？')) return;
      try {
        await projectsAPI.delete(id);
        showToast('项目已删除', 'success');
        loadProjects();
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadProjects();
  </script>
</body>
</html>
