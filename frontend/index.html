<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人主页 - 全栈开发 · 技术随笔 · 生活记录">
  <title>CodeNinja - 个人主页</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 粒子星空背景 -->
  <canvas id="particles-canvas"></canvas>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">&lt;<span>C</span>odeNinja /&gt;</a>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="about.html">关于我</a>
        <a href="articles.html">文章</a>
        <a href="projects.html">项目</a>
        <a href="gallery.html">相册</a>
        <a href="guestbook.html">留言板</a>
      </div>
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- 页面内容区（路由器在此区域内替换内容） -->
  <main id="app-content">

  <!-- Hero 区域 -->
  <section class="hero-section">
    <div class="container">
      <div class="hero-content">
        <!-- 左侧：头像 + 信息 -->
        <div class="hero-left">
          <img id="hero-avatar" class="hero-avatar" src="assets/images/default-avatar.png"
               alt="头像" onerror="this.style.display='none'">
        </div>
        <!-- 右侧：文字信息 -->
        <div class="hero-right">
          <h1 id="hero-nickname" class="hero-nickname">CodeNinja</h1>
          <p id="hero-signature" class="hero-signature">用代码构建世界，用文字记录思考。</p>
          <p id="hero-bio" class="hero-bio-short"></p>
          <!-- 技术标签 -->
          <div id="hero-tags" class="hero-tags"></div>
          <!-- 社交链接 -->
          <div id="hero-social" class="hero-social"></div>
        </div>
      </div>

      <!-- 统计数据 -->
      <div class="hero-stats" id="hero-stats">
        <div class="stat-item">
          <div class="stat-number" id="stat-visits">0</div>
          <div class="stat-label">总访问量</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="stat-articles">0</div>
          <div class="stat-label">文章</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="stat-projects">0</div>
          <div class="stat-label">项目</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="stat-messages">0</div>
          <div class="stat-label">留言</div>
        </div>
      </div>

      <!-- 快捷导航 -->
      <div class="hero-nav-cards">
        <a href="about.html" class="nav-card">
          <span class="icon">👤</span>
          <span class="label">关于我</span>
        </a>
        <a href="articles.html" class="nav-card">
          <span class="icon">📝</span>
          <span class="label">文章随笔</span>
        </a>
        <a href="projects.html" class="nav-card">
          <span class="icon">🚀</span>
          <span class="label">项目展示</span>
        </a>
        <a href="gallery.html" class="nav-card">
          <span class="icon">📷</span>
          <span class="label">相册图集</span>
        </a>
        <a href="guestbook.html" class="nav-card">
          <span class="icon">💬</span>
          <span class="label">留言板</span>
        </a>
      </div>
    </div>
  </section>

  <!-- 最新文章 -->
  <section class="section" id="home-articles">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">📝 最新文章</h2>
        <a href="articles.html" class="section-more">查看全部 →</a>
      </div>
      <div class="articles-grid" id="home-articles-grid">
        <div class="loading"><span class="loading-spinner"></span><p>加载中...</p></div>
      </div>
    </div>
  </section>

  <!-- 精选项目 -->
  <section class="section" id="home-projects">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">🚀 项目展示</h2>
        <a href="projects.html" class="section-more">查看全部 →</a>
      </div>
      <div class="projects-grid" id="home-projects-grid">
        <div class="loading"><span class="loading-spinner"></span><p>加载中...</p></div>
      </div>
    </div>
  </section>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <a href="index.html" class="nav-logo">&lt;<span>C</span>odeNinja /&gt;</a>
          <p>用代码构建世界，用文字记录思考。</p>
        </div>
        <div class="footer-links">
          <a href="about.html">关于我</a>
          <a href="articles.html">文章</a>
          <a href="projects.html">项目</a>
          <a href="gallery.html">相册</a>
          <a href="guestbook.html">留言板</a>
          <a href="admin/login.html">后台管理</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p id="footer-text">© 2026 CodeNinja. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <!-- 回到顶部 -->
  <button class="back-to-top" title="回到顶部">↑</button>

  <!-- 脚本 -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/router.js"></script>
  <script>
    // ==================== 加载首页全部数据 ====================
    (async function loadHomeData() {
      try {
        // 并行加载：站点设置 + 统计数据 + 文章列表 + 项目列表
        const [settingsRes, statsRes, articlesRes, projectsRes] = await Promise.all([
          settingsAPI.get(),
          statsAPI.get(),
          articlesAPI.list({ page: 1, pageSize: 4 }),
          projectsAPI.list()
        ]);

        const settings = settingsRes.data;
        const stats = statsRes.data;

        // 1. 页面标题
        document.title = settings.site_title || '个人主页';

        // 2. 头像
        if (settings.avatar_url) {
          document.getElementById('hero-avatar').src = settings.avatar_url;
        }

        // 3. 昵称 + 签名
        document.getElementById('hero-nickname').textContent = settings.nickname || 'CodeNinja';
        document.getElementById('hero-signature').textContent = settings.signature || '';

        // 4. 简短简介
        if (settings.bio) {
          const shortBio = settings.bio.split('\n')[0] || '';
          document.getElementById('hero-bio').textContent = shortBio;
        }

        // 5. 统计数据
        document.getElementById('stat-visits').textContent = stats.totalVisits || 0;
        document.getElementById('stat-articles').textContent = stats.articleCount || 0;
        document.getElementById('stat-projects').textContent = stats.projectCount || 0;
        document.getElementById('stat-messages').textContent = stats.messageCount || 0;

        // 6. 技术标签
        const tagsContainer = document.getElementById('hero-tags');
        if (settings.tech_stack) {
          const tags = Array.isArray(settings.tech_stack) ? settings.tech_stack : [];
          tagsContainer.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
        }

        // 7. 社交链接
        const socialContainer = document.getElementById('hero-social');
        if (settings.social_links) {
          const links = Array.isArray(settings.social_links) ? settings.social_links : [];
          socialContainer.innerHTML = links.map(l =>
            `<a href="${l.url}" class="social-link" target="_blank" rel="noopener">${l.name}</a>`
          ).join('');
        }

        // 8. 最新文章
        const articlesGrid = document.getElementById('home-articles-grid');
        if (articlesRes.code === 200 && articlesRes.data.list.length > 0) {
          articlesGrid.innerHTML = articlesRes.data.list.map(a => `
            <article class="article-card card animate-fade-in-up" onclick="router.navigate('article-detail.html?id=${a.id}')">
              <div class="meta">
                <span>${a.category_name || ''}</span>
                <span>${formatDate(a.published_at)}</span>
              </div>
              <h3 class="title"><a href="article-detail.html?id=${a.id}">${escapeHtml(a.title)}</a></h3>
              <p class="summary">${escapeHtml(a.summary || '')}</p>
            </article>
          `).join('');
        } else {
          articlesGrid.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>还没有文章，快去写第一篇吧！</p></div>';
        }

        // 9. 精选项目
        const projectsGrid = document.getElementById('home-projects-grid');
        if (projectsRes.code === 200 && projectsRes.data.length > 0) {
          projectsGrid.innerHTML = projectsRes.data.map(p => `
            <div class="project-card card animate-fade-in-up">
              <h3 class="title">${escapeHtml(p.title)}</h3>
              <p class="summary" style="color:var(--text-secondary);margin-bottom:12px;">${escapeHtml(p.description || '')}</p>
              <div class="tech-tags">
                ${(p.tech_tags || '').split(',').filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('')}
              </div>
              <div class="project-links">
                ${p.demo_url ? `<a href="${p.demo_url}" target="_blank" class="btn btn-sm btn-secondary">🌐 预览</a>` : ''}
                ${p.github_url ? `<a href="${p.github_url}" target="_blank" class="btn btn-sm btn-secondary">📦 源码</a>` : ''}
              </div>
            </div>
          `).join('');
        } else {
          projectsGrid.innerHTML = '<div class="empty-state"><div class="icon">🚀</div><p>暂无项目展示</p></div>';
        }

        // 10. 页脚
        document.getElementById('footer-text').textContent = settings.footer_copyright || '© 2026';

      } catch (error) {
        console.error('加载首页数据失败:', error);
      }
    })();

    // 工具函数
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toISOString().slice(0, 10);
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
